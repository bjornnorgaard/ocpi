  # eMSP Receiver Interface Endpoints
  /locations/{country_code}/{party_id}/{location_id}:
    get:
      tags:
        - eMSP Receiver Interface
      summary: Retrieve location from eMSP system
      description: |
        Retrieve a Location as it is stored in the eMSP system.
        Used by CPO to validate the object in the eMSP's system.
      parameters:
        - name: country_code
          in: path
          required: true
          description: Country code of the CPO requesting data from the eMSP system
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 2
        - name: party_id
          in: path
          required: true
          description: Party ID (Provider ID) of the CPO requesting data from the eMSP system
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 3
        - name: location_id
          in: path
          required: true
          description: Location.id of the Location object to retrieve
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 36
      responses:
        '200':
          description: Successful response with location data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
                  status_code:
                    type: integer
                    example: 1000
                  status_message:
                    type: string
                    example: "Success"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - eMSP Receiver Interface
      summary: Push new/updated Location to eMSP
      description: |
        Push new/updated Location, EVSE and/or Connector to the eMSP.
        PUT can be used to send new Location objects to the eMSP but also to replace existing Locations.
      parameters:
        - name: country_code
          in: path
          required: true
          description: Country code of the CPO requesting this PUT to the eMSP system
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 2
        - name: party_id
          in: path
          required: true
          description: Party ID (Provider ID) of the CPO requesting this PUT to the eMSP system
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 3
        - name: location_id
          in: path
          required: true
          description: Location.id of the new Location object, or the Location of which an EVSE or Connector object is pushed
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 36
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/Location'
                - $ref: '#/components/schemas/EVSE'
                - $ref: '#/components/schemas/Connector'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OCPIResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - eMSP Receiver Interface
      summary: Notify eMSP of partial updates
      description: |
        Notify the eMSP of partial updates to a Location, EVSE or Connector (such as the status).
        Only the fields/objects that have to be updated have to be present.
      parameters:
        - name: country_code
          in: path
          required: true
          description: Country code of the CPO requesting this PATCH to the eMSP system
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 2
        - name: party_id
          in: path
          required: true
          description: Party ID (Provider ID) of the CPO requesting this PATCH to the eMSP system
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 3
        - name: location_id
          in: path
          required: true
          description: Location.id of the Location object to update
          schema:
            allOf:
              - $ref: '#/components/schemas/CiString'
              - maxLength: 36
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  description: Partial Location object with only changed fields
                  properties:
                    last_updated:
                      type: string
                      format: date-time
                      description: Timestamp when this Location was last updated (required for PATCH)
                  required:
                    - last_updated
                - type: object
                  description: Partial EVSE object with only changed fields
                  properties:
                    last_updated:
                      type: string
                      format: date-time
                      description: Timestamp when this EVSE was last updated (required for PATCH)
                  required:
                    - last_updated
                - type: object
                  description: Partial Connector object with only changed fields
                  properties:
                    last_updated:
                      type: string
                      format: date-time
                      description: Timestamp when this Connector was last updated (required for PATCH)
                  required:
                    - last_updated
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OCPIResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

