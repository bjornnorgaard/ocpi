paths:
  /{version}/tariffs:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/PaginationLimit
      - $ref: ../components/parameters/common.yaml#/parameters/PaginationOffset
      - $ref: ../components/parameters/common.yaml#/parameters/DateFrom
      - $ref: ../components/parameters/common.yaml#/parameters/DateTo
    get:
      tags: [Tariffs]
      summary: Get all tariffs
      description: Retrieve all tariffs
      responses:
        '200':
          description: List of tariffs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/tariffs.yaml#/schemas/TariffList
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
  /{version}/tariffs/{country_code}/{party_id}:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/CountryCode
      - $ref: ../components/parameters/common.yaml#/parameters/PartyId
      - $ref: ../components/parameters/common.yaml#/parameters/PaginationLimit
      - $ref: ../components/parameters/common.yaml#/parameters/PaginationOffset
      - $ref: ../components/parameters/common.yaml#/parameters/DateFrom
      - $ref: ../components/parameters/common.yaml#/parameters/DateTo
    get:
      tags: [Tariffs]
      summary: Get tariffs for party
      description: Retrieve tariffs for specific country and party
      responses:
        '200':
          description: List of tariffs for party
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/tariffs.yaml#/schemas/TariffList
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '404':
          $ref: ../components/responses/common.yaml#/responses/OCPI_NotFound
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
  /{version}/tariffs/{country_code}/{party_id}/{tariff_id}:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/CountryCode
      - $ref: ../components/parameters/common.yaml#/parameters/PartyId
      - $ref: ../components/parameters/common.yaml#/parameters/TariffId
    get:
      tags: [Tariffs]
      summary: Get specific tariff
      description: Retrieve a specific tariff
      responses:
        '200':
          description: Tariff details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/common.yaml#/schemas/Tariff
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '404':
          $ref: ../components/responses/common.yaml#/responses/OCPI_NotFound
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
    put:
      tags: [Tariffs]
      summary: Create or update tariff
      description: Create or update a tariff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/common.yaml#/schemas/Tariff
      responses:
        '200':
          description: Tariff updated successfully
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '201':
          description: Tariff created successfully
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError