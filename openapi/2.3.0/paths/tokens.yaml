paths:
  /{version}/tokens:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
    get:
      tags: [Tokens]
      summary: Get all tokens
      responses:
        '200':
          description: List of tokens
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/tokens.yaml#/schemas/TokenList
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
  /{version}/tokens/{country_code}/{party_id}:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/CountryCode
      - $ref: ../components/parameters/common.yaml#/parameters/PartyId
    get:
      tags: [Tokens]
      summary: Get tokens for party
      responses:
        '200':
          description: List of tokens for party
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/tokens.yaml#/schemas/TokenList
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '404':
          $ref: ../components/responses/common.yaml#/responses/OCPI_NotFound
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
  /{version}/tokens/{country_code}/{party_id}/{token_uid}:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/CountryCode
      - $ref: ../components/parameters/common.yaml#/parameters/PartyId
      - $ref: ../components/parameters/common.yaml#/parameters/TokenUid
    get:
      tags: [Tokens]
      summary: Get specific token
      responses:
        '200':
          description: Token details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/common.yaml#/schemas/Token
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '404':
          $ref: ../components/responses/common.yaml#/responses/OCPI_NotFound
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
    put:
      tags: [Tokens]
      summary: Create or update token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/common.yaml#/schemas/Token
      responses:
        '200':
          description: Token updated successfully
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '201':
          description: Token created successfully
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
  /{version}/tokens/{country_code}/{party_id}/{token_uid}/authorize:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/CountryCode
      - $ref: ../components/parameters/common.yaml#/parameters/PartyId
      - $ref: ../components/parameters/common.yaml#/parameters/TokenUid
    post:
      tags: [Tokens]
      summary: Authorize token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/tokens.yaml#/schemas/AuthorizationRequest
      responses:
        '200':
          description: Authorization response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/common.yaml#/schemas/AuthorizationInfo
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '404':
          $ref: ../components/responses/common.yaml#/responses/OCPI_NotFound
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError