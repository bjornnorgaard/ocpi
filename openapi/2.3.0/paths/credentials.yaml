paths:
  /{version}/credentials:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
    get:
      tags: [Credentials]
      summary: Get credentials
      description: Retrieve the credentials object for this platform
      responses:
        '200':
          description: Credentials object
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/credentials.yaml#/schemas/CredentialsObject
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
    post:
      tags: [Credentials]
      summary: Create credentials
      description: Send credentials to connect to this platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/credentials.yaml#/schemas/CredentialsObject
      responses:
        '200':
          description: Credentials accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/credentials.yaml#/schemas/CredentialsObject
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
    put:
      tags: [Credentials]
      summary: Update credentials
      description: Update the credentials for this platform connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/credentials.yaml#/schemas/CredentialsObject
      responses:
        '200':
          description: Credentials updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/credentials.yaml#/schemas/CredentialsObject
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
    delete:
      tags: [Credentials]
      summary: Delete credentials
      description: Disconnect from this platform by removing credentials
      responses:
        '200':
          description: Credentials deleted
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError