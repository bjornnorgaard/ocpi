paths:
  /{version}/hubclientinfo:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
    get:
      tags: [HubClientInfo]
      summary: Get hub client information
      responses:
        '200':
          description: List of hub client info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: ../components/schemas/common.yaml#/schemas/ClientInfo
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
    post:
      tags: [HubClientInfo]
      summary: Create hub client info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/common.yaml#/schemas/ClientInfo
      responses:
        '201':
          description: Client info created successfully
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError