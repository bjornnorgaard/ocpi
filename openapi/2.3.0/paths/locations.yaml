paths:
  /{version}/locations:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/PaginationLimit
      - $ref: ../components/parameters/common.yaml#/parameters/PaginationOffset
      - $ref: ../components/parameters/common.yaml#/parameters/DateFrom
      - $ref: ../components/parameters/common.yaml#/parameters/DateTo
    get:
      tags: [Locations]
      summary: Get all locations
      description: Retrieve all locations
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/locations.yaml#/schemas/LocationList
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
  /{version}/locations/{country_code}/{party_id}:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/CountryCode
      - $ref: ../components/parameters/common.yaml#/parameters/PartyId
      - $ref: ../components/parameters/common.yaml#/parameters/PaginationLimit
      - $ref: ../components/parameters/common.yaml#/parameters/PaginationOffset
      - $ref: ../components/parameters/common.yaml#/parameters/DateFrom
      - $ref: ../components/parameters/common.yaml#/parameters/DateTo
    get:
      tags: [Locations]
      summary: Get locations for party
      description: Retrieve locations for specific country and party
      responses:
        '200':
          description: List of locations for party
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/locations.yaml#/schemas/LocationList
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '404':
          $ref: ../components/responses/common.yaml#/responses/OCPI_NotFound
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
  /{version}/locations/{country_code}/{party_id}/{location_id}:
    parameters:
      - $ref: ../components/parameters/common.yaml#/parameters/VersionParam
      - $ref: ../components/parameters/common.yaml#/parameters/CountryCode
      - $ref: ../components/parameters/common.yaml#/parameters/PartyId
      - $ref: ../components/parameters/common.yaml#/parameters/LocationId
    get:
      tags: [Locations]
      summary: Get specific location
      description: Retrieve a specific location
      responses:
        '200':
          description: Location details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
                  - type: object
                    properties:
                      data:
                        $ref: ../components/schemas/common.yaml#/schemas/Location
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '404':
          $ref: ../components/responses/common.yaml#/responses/OCPI_NotFound
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
    put:
      tags: [Locations]
      summary: Create or update location
      description: Create or update a location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/common.yaml#/schemas/Location
      responses:
        '200':
          description: Location updated successfully
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '201':
          description: Location created successfully
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
    patch:
      tags: [Locations]
      summary: Partially update location
      description: Partially update a location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/locations.yaml#/schemas/LocationPatch
      responses:
        '200':
          description: Location updated successfully
          content:
            application/json:
              schema:
                $ref: ../components/schemas/common.yaml#/schemas/OCPIResponse
        '400':
          $ref: ../components/responses/common.yaml#/responses/OCPI_BadRequest
        '401':
          $ref: ../components/responses/common.yaml#/responses/OCPI_Unauthorized
        '404':
          $ref: ../components/responses/common.yaml#/responses/OCPI_NotFound
        '500':
          $ref: ../components/responses/common.yaml#/responses/OCPI_ServerError
