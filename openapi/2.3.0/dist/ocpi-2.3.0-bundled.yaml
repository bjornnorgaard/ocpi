openapi: 3.1.0
info:
  title: OCPI 2.3.0 API
  version: 2.3.0
  description: >
    Comprehensive OpenAPI 3.1.0 specification for OCPI (Open Charge Point Interface) version 2.3.0.

    Split across multiple files for maintainability. Enumerations and shared schemas consolidated under components.

    Source: https://github.com/ocpi/ocpi (reference standard). This representation aims to cover all core and optional
    modules

    in OCPI 2.3.0: Versions, Credentials, Locations, Tariffs, Tokens, Sessions, CDRs, Commands, Charging Profiles,

    Hub Client Info. Validate against official spec before production use.
  license:
    name: CC BY-SA 4.0
    url: https://creativecommons.org/licenses/by-sa/4.0/
servers:
  - url: https://example.com/ocpi
    description: Example base OCPI endpoint (root exposing /versions)
security:
  - OCPI_Token: []
tags:
  - name: Versions
  - name: Credentials
  - name: Locations
  - name: Tariffs
  - name: Tokens
  - name: Sessions
  - name: CDRs
  - name: Commands
  - name: ChargingProfiles
  - name: HubClientInfo
x-ocpi-version: 2.3.0
paths:
  /versions:
    get:
      tags:
        - Versions
      summary: Get available API versions
      description: List all available API versions
      security: []
      responses:
        '200':
          description: List of available versions
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required:
                      - status_code
                      - timestamp
                    properties:
                      status_code:
                        type: integer
                      status_message:
                        type: string
                        nullable: true
                      timestamp:
                        type: string
                        format: date-time
                      data:
                        nullable: true
                        description: Endpoint-specific data body
                      total_count:
                        type: integer
                        nullable: true
                      limit:
                        type: integer
                        nullable: true
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          required:
                            - version
                            - url
                          properties:
                            version:
                              type: string
                              example: '2.3'
                            url:
                              type: string
                              format: uri
        '400':
          description: Invalid parameters supplied
          content:
            application/json:
              schema:
                type: object
                required:
                  - status_code
                  - timestamp
                properties:
                  status_code:
                    type: integer
                  status_message:
                    type: string
                    nullable: true
                  timestamp:
                    type: string
                    format: date-time
                  data:
                    nullable: true
                    description: Endpoint-specific data body
                  total_count:
                    type: integer
                    nullable: true
                  limit:
                    type: integer
                    nullable: true
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                required:
                  - status_code
                  - timestamp
                properties:
                  status_code:
                    type: integer
                  status_message:
                    type: string
                    nullable: true
                  timestamp:
                    type: string
                    format: date-time
                  data:
                    nullable: true
                    description: Endpoint-specific data body
                  total_count:
                    type: integer
                    nullable: true
                  limit:
                    type: integer
                    nullable: true
