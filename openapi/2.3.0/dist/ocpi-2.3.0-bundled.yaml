  /{version}/locations:
    parameters:
      - name: version
        in: path
        required: true
        schema:
          type: string
          example: '2.3'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
      - name: date_from
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - name: date_to
        in: query
        required: false
        schema:
          type: string
          format: date-time
    get:
      tags:
        - Locations
      summary: Get all locations
      description: Retrieve all locations
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required:
                      - status_code
                      - timestamp
                    properties:
                      status_code:
                        type: integer
                      status_message:
                        type: string
                        nullable: true
                      timestamp:
                        type: string
                        format: date-time
                      data:
                        nullable: true
                        description: Endpoint-specific data body
                      total_count:
                        type: integer
                        nullable: true
                      limit:
                        type: integer
                        nullable: true
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          required:
                            - id
                            - address
                            - city
                            - country
                            - coordinates
                            - last_updated
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                              enum:
                                - ON_STREET
                                - PARKING_GARAGE
                                - UNDERGROUND_GARAGE
                                - PARKING_LOT
                                - OTHER
                                - PRIVATE
                                - PUBLIC_PARKING
                            name:
                              type: string
                            address:
                              type: string
                            city:
                              type: string
                            postal_code:
                              type: string
                            country:
                              type: string
                            coordinates:
                              type: object
                              required:
                                - latitude
                                - longitude
                              properties:
                                latitude:
                                  type: string
                                longitude:
                                  type: string
                            related_locations:
                              type: array
                              items:
                                allOf:
                                  - type: object
                                    required:
                                      - latitude
                                      - longitude
                                    properties:
                                      latitude:
                                        type: string
                                      longitude:
                                        type: string
                                  - type: object
                                    properties:
                                      name:
                                        type: string
                            parking_type:
                              type: string
                              enum:
                                - ALONG_MOTORWAY
                                - PARKING_GARAGE
                                - UNDERGROUND_GARAGE
                                - PARKING_LOT
