              - NUCLEAR
              - GENERAL_FOSSIL
              - COAL
              - GAS
              - OIL
              - GENERAL_GREEN
              - WIND
              - SOLAR
              - HYDRO
              - TIDAL
              - GEOTHERMAL
              - BIOMASS
          percentage:
            type: number
      EnvironmentalImpact:
        type: object
        properties:
          category:
            type: string
            enum:
              - CARBON_DIOXIDE
              - NOX
              - PARTICULATES
          amount:
            type: number
