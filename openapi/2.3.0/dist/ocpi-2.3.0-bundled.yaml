            type: string
          website:
            type: string
            format: uri
            nullable: true
          logo:
            type: object
            properties:
              url:
                type: string
                format: uri
              thumbnail:
                type: string
                format: uri
              category:
                type: string
                enum:
                  - CHARGER
                  - ENTRANCE
                  - LOCATION
                  - NETWORK
                  - OPERATOR
                  - OTHER
                  - OWNER
              type:
                type: string
                enum:
                  - GIF
                  - JPEG
                  - PNG
                  - SVG
              width:
                type: integer
              height:
                type: integer
      Image:
        type: object
        properties:
          url:
