  securitySchemes:
    OCPI_Token:
      type: apiKey
      in: header
      name: Authorization
      description: 'OCPI access token. Format: ''Token <token>''.'
  parameters:
    VersionParam:
      name: version
      in: path
      required: true
      schema:
        type: string
        example: '2.3'
    CountryCode:
      name: country_code
      in: path
      required: true
      schema:
        type: string
        pattern: ^[A-Z]{2}$
    PartyId:
      name: party_id
      in: path
      required: true
      schema:
        type: string
        pattern: ^[A-Z0-9]{3}$
    LocationId:
      name: location_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 36
    EVSEUid:
      name: evse_uid
      in: path
      required: true
      schema:
        type: string
        maxLength: 48
    ConnectorId:
      name: connector_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 36
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 36
    CdrId:
      name: cdr_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 36
    TariffId:
      name: tariff_id
      in: path
      required: true
      schema:
        type: string
    TokenUid:
      name: token_uid
      in: path
      required: true
      schema:
        type: string
    CommandId:
      name: command_id
      in: path
      required: true
      schema:
        type: string
    PaginationLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    PaginationOffset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    DateFrom:
      name: date_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    DateTo:
      name: date_to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    XRequestId:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
    XCorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
