              - FLAT
              - PARKING_TIME
              - TIME
              - TIME_OF_DAY
              - RESERVATION_TIME
              - RESERVATION_FLAT
          price:
            type: number
          vat:
            type: number
            nullable: true
          step_size:
            type: integer
      TariffRestriction:
        type: object
        properties:
          start_time:
            type: string
            pattern: ^([0-1][0-9]|2[0-3]):[0-5][0-9]$
          end_time:
            type: string
            pattern: ^([0-1][0-9]|2[0-3]):[0-5][0-9]$
          start_date:
            type: string
            format: date
          end_date:
            type: string
            format: date
          min_kwh:
            type: number
          max_kwh:
            type: number
          min_power:
            type: number
          max_power:
            type: number
          min_duration:
            type: integer
          max_duration:
            type: integer
          day_of_week:
            type: array
            items:
              type: string
              enum:
                - MONDAY
                - TUESDAY
                - WEDNESDAY
                - THURSDAY
                - FRIDAY
                - SATURDAY
                - SUNDAY
      TariffElement:
        type: object
