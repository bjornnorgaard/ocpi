            format: uri
          thumbnail:
            type: string
            format: uri
          category:
            type: string
            enum:
              - CHARGER
              - ENTRANCE
              - LOCATION
              - NETWORK
              - OPERATOR
              - OTHER
              - OWNER
          type:
            type: string
            enum:
              - GIF
              - JPEG
              - PNG
              - SVG
          width:
            type: integer
          height:
            type: integer
