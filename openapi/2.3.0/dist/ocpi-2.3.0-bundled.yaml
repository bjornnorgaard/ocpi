  responses:
    OCPI_GenericSuccess:
      description: Successful OCPI operation
      content:
        application/json:
          schema:
            type: object
            required:
              - status_code
              - timestamp
            properties:
              status_code:
                type: integer
              status_message:
                type: string
                nullable: true
              timestamp:
                type: string
                format: date-time
              data:
                nullable: true
                description: Endpoint-specific data body
              total_count:
                type: integer
                nullable: true
              limit:
                type: integer
                nullable: true
    OCPI_BadRequest:
      description: Invalid parameters supplied
      content:
        application/json:
          schema:
            type: object
            required:
              - status_code
              - timestamp
            properties:
              status_code:
                type: integer
              status_message:
                type: string
                nullable: true
              timestamp:
                type: string
                format: date-time
              data:
                nullable: true
                description: Endpoint-specific data body
              total_count:
                type: integer
                nullable: true
              limit:
                type: integer
                nullable: true
    OCPI_Unauthorized:
      description: Authentication failed or missing
      content:
        application/json:
          schema:
            type: object
            required:
              - status_code
              - timestamp
            properties:
              status_code:
                type: integer
              status_message:
                type: string
                nullable: true
              timestamp:
                type: string
                format: date-time
              data:
                nullable: true
                description: Endpoint-specific data body
              total_count:
                type: integer
                nullable: true
              limit:
                type: integer
                nullable: true
    OCPI_NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            required:
              - status_code
              - timestamp
            properties:
              status_code:
                type: integer
              status_message:
                type: string
                nullable: true
              timestamp:
                type: string
                format: date-time
              data:
                nullable: true
                description: Endpoint-specific data body
              total_count:
                type: integer
                nullable: true
              limit:
                type: integer
                nullable: true
    OCPI_ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            required:
              - status_code
              - timestamp
            properties:
              status_code:
                type: integer
              status_message:
                type: string
                nullable: true
              timestamp:
                type: string
                format: date-time
              data:
                nullable: true
                description: Endpoint-specific data body
              total_count:
                type: integer
                nullable: true
              limit:
                type: integer
                nullable: true
  schemas:
    common:
      OCPIResponse:
        type: object
        required:
          - status_code
          - timestamp
        properties:
          status_code:
            type: integer
          status_message:
            type: string
            nullable: true
          timestamp:
            type: string
            format: date-time
          data:
            nullable: true
            description: Endpoint-specific data body
          total_count:
            type: integer
            nullable: true
          limit:
            type: integer
            nullable: true
      Version:
        type: object
        required:
          - version
          - url
        properties:
          version:
            type: string
            example: '2.3'
          url:
            type: string
            format: uri
      Endpoint:
        type: object
        required:
          - identifier
          - url
        properties:
          identifier:
            type: string
          role:
            type: string
