        type: object
        required:
          - latitude
          - longitude
        properties:
          latitude:
            type: string
          longitude:
            type: string
      AdditionalGeoLocation:
        allOf:
          - type: object
            required:
              - latitude
              - longitude
            properties:
              latitude:
                type: string
              longitude:
                type: string
          - type: object
            properties:
              name:
                type: string
      EnergySource:
        type: object
