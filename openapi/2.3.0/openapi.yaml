  /{version}/chargingprofiles:
    $ref: ./paths/chargingprofiles.yaml#/paths/~1{version}~1chargingprofiles
  /{version}/hubclientinfo:
    $ref: ./paths/hubclientinfo.yaml#/paths/~1{version}~1hubclientinfo
