      $ref: ./components/schemas/versions.yaml#/schemas
    credentials:
      $ref: ./components/schemas/credentials.yaml#/schemas
    locations:
      $ref: ./components/schemas/locations.yaml#/schemas
    tariffs:
      $ref: ./components/schemas/tariffs.yaml#/schemas
    tokens:
      $ref: ./components/schemas/tokens.yaml#/schemas
    sessions:
      $ref: ./components/schemas/sessions.yaml#/schemas
    cdrs:
      $ref: ./components/schemas/cdrs.yaml#/schemas
    commands:
      $ref: ./components/schemas/commands.yaml#/schemas